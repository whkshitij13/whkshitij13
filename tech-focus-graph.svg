<svg width="1200" height="330" viewBox="0 0 1200 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cluster and line graph showing Kshitij Kumar's technology focus">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="58%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="35%" stop-color="#38bdf8"/>
      <stop offset="70%" stop-color="#00a1e0"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="330" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="330" rx="18" fill="url(#grid)" opacity="0.7"/>

  <text x="600" y="35" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="23" font-weight="700" fill="#f8fafc">Technology Focus Graph</text>
  <text x="600" y="59" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="13" fill="#94a3b8">3+ years experience - Software Developer | Salesforce Developer</text>

  <g stroke="#475569" stroke-width="1">
    <line x1="92" y1="255" x2="1080" y2="255"/>
    <line x1="92" y1="95" x2="92" y2="255"/>
    <line x1="92" y1="215" x2="1080" y2="215" opacity="0.45"/>
    <line x1="92" y1="175" x2="1080" y2="175" opacity="0.45"/>
    <line x1="92" y1="135" x2="1080" y2="135" opacity="0.45"/>
    <line x1="92" y1="95" x2="1080" y2="95" opacity="0.45"/>
  </g>

  <g font-family="Verdana, Arial, sans-serif" font-size="12" fill="#94a3b8">
    <text x="92" y="278" text-anchor="middle">2023</text>
    <text x="330" y="278" text-anchor="middle">2024</text>
    <text x="568" y="278" text-anchor="middle">2025</text>
    <text x="806" y="278" text-anchor="middle">2026</text>
    <text x="1080" y="278" text-anchor="middle">Next</text>
  </g>

  <polyline points="92,218 330,190 568,156 806,126 1080,104" fill="none" stroke="url(#line)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="0 1400;1400 0" dur="2.2s" fill="freeze"/>
  </polyline>

  <g filter="url(#glow)">
    <circle cx="92" cy="218" r="8" fill="#22c55e"/>
    <circle cx="330" cy="190" r="8" fill="#38bdf8"/>
    <circle cx="568" cy="156" r="8" fill="#00a1e0"/>
    <circle cx="806" cy="126" r="8" fill="#a78bfa"/>
    <circle cx="1080" cy="104" r="8" fill="#a78bfa"/>
  </g>

  <g font-family="Verdana, Arial, sans-serif" font-size="13" fill="#e5e7eb">
    <text x="120" y="213">Game dev</text>
    <text x="356" y="185">Web development</text>
    <text x="594" y="151">Salesforce starts</text>
    <text x="832" y="121">AI/ML joins</text>
    <text x="965" y="88">Salesforce + AI products</text>
  </g>

  <g font-family="Verdana, Arial, sans-serif" font-size="12" fill="#f8fafc">
    <line x1="330" y1="145" x2="428" y2="116" stroke="#22c55e" stroke-width="2" opacity="0.8"/>
    <line x1="428" y1="116" x2="538" y2="145" stroke="#38bdf8" stroke-width="2" opacity="0.8"/>
    <line x1="538" y1="145" x2="640" y2="112" stroke="#00a1e0" stroke-width="2" opacity="0.8"/>
    <line x1="640" y1="112" x2="735" y2="148" stroke="#a78bfa" stroke-width="2" opacity="0.8"/>
    <line x1="640" y1="112" x2="644" y2="210" stroke="#facc15" stroke-width="2" opacity="0.8"/>
    <circle cx="330" cy="145" r="30" fill="#22c55e" opacity="0.9"/>
    <circle cx="428" cy="116" r="26" fill="#facc15" opacity="0.85"/>
    <circle cx="538" cy="145" r="31" fill="#38bdf8" opacity="0.9"/>
    <circle cx="640" cy="112" r="30" fill="#00a1e0" opacity="0.9"/>
    <circle cx="735" cy="148" r="30" fill="#a78bfa" opacity="0.9"/>
    <circle cx="644" cy="210" r="25" fill="#f472b6" opacity="0.85"/>
    <text x="330" y="149" text-anchor="middle">Game</text>
    <text x="428" y="120" text-anchor="middle">Unity</text>
    <text x="538" y="149" text-anchor="middle">Web</text>
    <text x="640" y="116" text-anchor="middle">SF</text>
    <text x="735" y="152" text-anchor="middle">AI/ML</text>
    <text x="644" y="214" text-anchor="middle">CRM</text>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="3s" repeatCount="indefinite"/>
  </g>
</svg>
