<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated car traveling through Kshitij Kumar's tech cities">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1a103d"/>
      <stop offset="100%" stop-color="#3b1f6b"/>
    </linearGradient>
    <linearGradient id="roadGlow" x1="0" x2="1">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#ff4fd8"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <g id="star">
      <circle r="1.8" fill="#fff176"/>
    </g>
    <g id="buildingA">
      <rect width="110" height="88" rx="4" fill="#1b1b3a" stroke="#00f5ff" stroke-width="2"/>
      <rect x="10" y="14" width="14" height="14" fill="#fff176"/>
      <rect x="32" y="14" width="14" height="14" fill="#ff7ee5"/>
      <rect x="54" y="14" width="14" height="14" fill="#00f5ff"/>
      <rect x="76" y="14" width="14" height="14" fill="#fff176"/>
      <rect x="10" y="38" width="14" height="14" fill="#00f5ff"/>
      <rect x="32" y="38" width="14" height="14" fill="#fff176"/>
      <rect x="54" y="38" width="14" height="14" fill="#ff7ee5"/>
      <rect x="76" y="38" width="14" height="14" fill="#00f5ff"/>
    </g>
    <g id="car">
      <rect x="20" y="36" width="82" height="22" rx="8" fill="#ff5353" stroke="#1b1b3a" stroke-width="3"/>
      <rect x="38" y="18" width="40" height="24" rx="6" fill="#ffd166" stroke="#1b1b3a" stroke-width="3"/>
      <rect x="48" y="24" width="12" height="10" rx="2" fill="#8be9fd"/>
      <rect x="62" y="24" width="12" height="10" rx="2" fill="#8be9fd"/>
      <circle cx="40" cy="60" r="11" fill="#222"/>
      <circle cx="82" cy="60" r="11" fill="#222"/>
      <circle cx="40" cy="60" r="4" fill="#bbb"/>
      <circle cx="82" cy="60" r="4" fill="#bbb"/>
      <circle cx="98" cy="45" r="4" fill="#fff176"/>
      <rect x="10" y="42" width="10" height="6" rx="3" fill="#ffd166"/>
    </g>
  </defs>

  <rect width="1200" height="320" fill="url(#sky)"/>

  <g opacity="0.9">
    <use href="#star" x="60" y="40"/>
    <use href="#star" x="140" y="78"/>
    <use href="#star" x="220" y="36"/>
    <use href="#star" x="340" y="54"/>
    <use href="#star" x="430" y="28"/>
    <use href="#star" x="560" y="70"/>
    <use href="#star" x="690" y="42"/>
    <use href="#star" x="820" y="34"/>
    <use href="#star" x="930" y="68"/>
    <use href="#star" x="1060" y="38"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;-8 0;0 0" dur="4s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(40,145)">
    <use href="#buildingA" filter="url(#neon)"/>
    <text x="55" y="-12" text-anchor="middle" font-family="Verdana" font-size="18" fill="#fff176">Frontend City</text>
  </g>

  <g transform="translate(330,130)">
    <use href="#buildingA" filter="url(#neon)"/>
    <rect x="0" y="-20" width="110" height="20" fill="#00f5ff" opacity="0.15"/>
    <text x="55" y="-12" text-anchor="middle" font-family="Verdana" font-size="18" fill="#00f5ff">Cloud City</text>
  </g>

  <g transform="translate(620,145)">
    <use href="#buildingA" filter="url(#neon)"/>
    <text x="55" y="-12" text-anchor="middle" font-family="Verdana" font-size="18" fill="#ff7ee5">AI Lab</text>
  </g>

  <g transform="translate(910,130)">
    <use href="#buildingA" filter="url(#neon)"/>
    <text x="55" y="-12" text-anchor="middle" font-family="Verdana" font-size="18" fill="#7cffcb">Game Dev Arena</text>
  </g>

  <path d="M40 260 C 210 250, 270 250, 420 260 S 700 272, 1160 256" fill="none" stroke="url(#roadGlow)" stroke-width="10" stroke-linecap="round" filter="url(#neon)"/>
  <path d="M40 260 C 210 250, 270 250, 420 260 S 700 272, 1160 256" fill="none" stroke="#2b1d55" stroke-width="24" stroke-linecap="round"/>
  <path d="M40 260 C 210 250, 270 250, 420 260 S 700 272, 1160 256" fill="none" stroke="url(#roadGlow)" stroke-width="6" stroke-linecap="round" stroke-dasharray="18 18" opacity="0.85"/>

  <g font-family="Verdana" font-size="14" fill="#ffffff" opacity="0.95">
    <text x="90" y="295">React • Angular • TypeScript</text>
    <text x="360" y="295">AWS • Docker • Architecture</text>
    <text x="675" y="295">ML • TensorFlow • Automation</text>
    <text x="930" y="295">Unity • Unreal • 3D Gameplay</text>
  </g>

  <g>
    <circle cx="95" cy="258" r="7" fill="#fff176"/>
    <circle cx="392" cy="257" r="7" fill="#00f5ff"/>
    <circle cx="690" cy="264" r="7" fill="#ff7ee5"/>
    <circle cx="1000" cy="258" r="7" fill="#7cffcb"/>
  </g>

  <g transform="translate(-120,-30)">
    <use href="#car"/>
    <animateMotion dur="9s" repeatCount="indefinite" rotate="auto">
      <mpath href="#motionPath"/>
    </animateMotion>
  </g>

  <path id="motionPath" d="M40 260 C 210 250, 270 250, 420 260 S 700 272, 1160 256" fill="none" stroke="none"/>

  <text x="600" y="36" text-anchor="middle" font-family="Verdana" font-size="24" fill="#ffffff">Kshitij Kumar's Tech Journey</text>
  <text x="600" y="62" text-anchor="middle" font-family="Verdana" font-size="14" fill="#f8f8f2">Software Developer @ Pricels • 3+ Years • Cloud • AI • Games</text>
</svg>
