<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated game selection screen showing four development paths for Kshitij Kumar">
  <defs>
    <linearGradient id="screenBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="45%" stop-color="#142033"/>
      <stop offset="100%" stop-color="#250f35"/>
    </linearGradient>
    <linearGradient id="webGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="gameGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="sfGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#00a1e0"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M 38 0 L 0 0 0 38" fill="none" stroke="#29415f" stroke-width="1" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" fill="url(#screenBg)"/>
  <rect width="1200" height="420" fill="url(#grid)" opacity="0.55"/>

  <g opacity="0.7">
    <circle cx="75" cy="70" r="2" fill="#f8fafc"/>
    <circle cx="180" cy="38" r="1.8" fill="#facc15"/>
    <circle cx="330" cy="82" r="2" fill="#7dd3fc"/>
    <circle cx="510" cy="44" r="1.7" fill="#f8fafc"/>
    <circle cx="760" cy="72" r="2" fill="#f472b6"/>
    <circle cx="940" cy="38" r="1.8" fill="#22d3ee"/>
    <circle cx="1105" cy="88" r="2" fill="#facc15"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 10 0; 0 0" dur="5s" repeatCount="indefinite"/>
  </g>

  <text x="600" y="46" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="26" font-weight="700" fill="#f8fafc">CHOOSE YOUR DEVELOPMENT PATH</text>
  <text x="600" y="74" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="14" fill="#cbd5e1">Kshitij Kumar - Web, Games, Salesforce, AI and ML</text>
  <text x="600" y="96" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="12" fill="#facc15">Click a card to jump to that section</text>

  <a href="#web-development">
    <g transform="translate(64,118)" filter="url(#softShadow)" style="cursor:pointer">
      <rect width="244" height="210" rx="12" fill="#091827" stroke="url(#webGrad)" stroke-width="4"/>
      <rect x="18" y="24" width="208" height="118" rx="8" fill="#0f2438" stroke="#38bdf8" stroke-width="2"/>
      <rect x="34" y="42" width="56" height="10" rx="5" fill="#38bdf8"/>
      <rect x="34" y="66" width="176" height="12" rx="6" fill="#164e63"/>
      <rect x="34" y="91" width="80" height="38" rx="5" fill="#0ea5e9" opacity="0.7"/>
      <rect x="128" y="91" width="82" height="38" rx="5" fill="#22d3ee" opacity="0.45"/>
      <text x="122" y="172" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="22" font-weight="700" fill="#e0f2fe">WEB DEV</text>
      <text x="122" y="194" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="12" fill="#bae6fd">Responsive apps</text>
    </g>
  </a>

  <a href="#game-dev-unity">
    <g transform="translate(342,118)" filter="url(#softShadow)" style="cursor:pointer">
      <rect width="244" height="210" rx="12" fill="#101a12" stroke="url(#gameGrad)" stroke-width="4"/>
      <rect x="48" y="36" width="148" height="88" rx="22" fill="#1f2937" stroke="#facc15" stroke-width="3"/>
      <circle cx="86" cy="80" r="18" fill="#22c55e"/>
      <rect x="78" y="68" width="16" height="24" rx="3" fill="#0f172a"/>
      <rect x="74" y="72" width="24" height="16" rx="3" fill="#0f172a"/>
      <circle cx="154" cy="72" r="8" fill="#ef4444"/>
      <circle cx="174" cy="90" r="8" fill="#38bdf8"/>
      <path d="M70 140 L122 116 L174 140 Z" fill="#22c55e" opacity="0.65" filter="url(#glow)">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -7;0 0" dur="1.7s" repeatCount="indefinite"/>
      </path>
      <text x="122" y="172" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="22" font-weight="700" fill="#dcfce7">GAME DEV</text>
      <text x="122" y="194" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="12" fill="#fef08a">Unity gameplay</text>
    </g>
  </a>

  <a href="#salesforce-dev">
    <g transform="translate(620,118)" filter="url(#softShadow)" style="cursor:pointer">
      <rect width="244" height="210" rx="12" fill="#081b2b" stroke="url(#sfGrad)" stroke-width="4"/>
      <path d="M72 95 C50 95 40 81 47 65 C53 50 68 48 79 56 C87 35 116 31 132 50 C145 43 166 50 170 68 C188 69 198 83 190 98 C183 110 168 112 152 111 L73 111 C64 111 57 105 72 95Z" fill="#00a1e0" opacity="0.95" filter="url(#glow)"/>
      <rect x="48" y="132" width="148" height="8" rx="4" fill="#7dd3fc"/>
      <rect x="62" y="149" width="120" height="8" rx="4" fill="#38bdf8" opacity="0.75"/>
      <text x="122" y="172" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="21" font-weight="700" fill="#e0f2fe">SALESFORCE</text>
      <text x="122" y="194" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="12" fill="#bae6fd">Orgs and CRM</text>
    </g>
  </a>

  <a href="#ai-and-ml">
    <g transform="translate(898,118)" filter="url(#softShadow)" style="cursor:pointer">
      <rect width="244" height="210" rx="12" fill="#1a1028" stroke="url(#aiGrad)" stroke-width="4"/>
      <g stroke="#c084fc" stroke-width="2" opacity="0.85">
        <line x1="72" y1="62" x2="124" y2="102"/>
        <line x1="72" y1="116" x2="124" y2="102"/>
        <line x1="124" y1="102" x2="176" y2="64"/>
        <line x1="124" y1="102" x2="176" y2="138"/>
        <line x1="72" y1="62" x2="176" y2="138"/>
      </g>
      <g fill="#f472b6" filter="url(#glow)">
        <circle cx="72" cy="62" r="10"/>
        <circle cx="72" cy="116" r="10"/>
        <circle cx="124" cy="102" r="13"/>
        <circle cx="176" cy="64" r="10"/>
        <circle cx="176" cy="138" r="10"/>
        <animateTransform attributeName="transform" type="scale" additive="sum" values="1;1.04;1" dur="2s" repeatCount="indefinite"/>
      </g>
      <text x="122" y="172" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="22" font-weight="700" fill="#f5d0fe">AI AND ML</text>
      <text x="122" y="194" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="12" fill="#ddd6fe">Neural systems</text>
    </g>
  </a>

  <g filter="url(#glow)">
    <rect x="54" y="108" width="264" height="230" rx="18" fill="none" stroke="#facc15" stroke-width="4" stroke-dasharray="12 12">
      <animate attributeName="x" values="54;332;610;888;54" dur="8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g font-family="Verdana, Arial, sans-serif" font-size="13" fill="#cbd5e1">
    <text x="600" y="374" text-anchor="middle">Roadmap: build interfaces - craft gameplay - automate CRM - train intelligent systems</text>
    <text x="600" y="396" text-anchor="middle" fill="#94a3b8">Animated selector cycles through each active development mode.</text>
  </g>
</svg>
